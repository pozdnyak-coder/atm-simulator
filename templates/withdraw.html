{% extends "base.html" %}
{% block title %}ATM — Снятие наличных{% endblock %}
{% block content %}
<div class="screen-title">● СНЯТИЕ НАЛИЧНЫХ</div>

<div class="balance-display" style="margin-bottom:20px">
  <div class="balance-label">Доступно</div>
  <div class="balance-amount">
    {{ "{:,.0f}".format(user.balance) }}<span class="balance-currency">сум</span>
  </div>
</div>

{% if error %}
<div class="alert alert-error">⚠ {{ error }}</div>
{% endif %}

<form action="/withdraw" method="post">
  <div class="form-group">
    <label>Быстрый выбор</label>
    <div class="quick-amounts">
      <div class="chip" data-amount="10000">10 000</div>
      <div class="chip" data-amount="20000">20 000</div>
      <div class="chip" data-amount="50000">50 000</div>
      <div class="chip" data-amount="100000">100 000</div>
    </div>
  </div>
  <div class="form-group">
    <label>Или введите сумму (кратно 1 000)</label>
    <input type="number" name="amount" id="amountInput"
           placeholder="0" min="1000" step="1000"
           autocomplete="off" autofocus required />
  </div>
  <button class="btn btn-primary" type="submit">Снять →</button>
  <a href="/menu" class="btn btn-secondary">← Назад</a>
</form>
{% endblock %}
