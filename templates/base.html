<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ATM — Банкомат{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap');

    :root {
      --bg:       #0a0e1a;
      --panel:    #111827;
      --card:     #1a2235;
      --border:   #1e3a5f;
      --accent:   #00d4ff;
      --accent2:  #0099cc;
      --green:    #00e676;
      --red:      #ff5252;
      --gold:     #ffd740;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,212,255,.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,153,204,.04) 0%, transparent 50%);
    }

    /* ── ATM Shell ── */
    .atm-shell {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,212,255,.08),
        0 25px 60px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.05);
    }

    /* ── Header Bar ── */
    .atm-header {
      background: linear-gradient(135deg, #0d1f3c 0%, #0a1628 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .atm-logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .atm-brand { font-family: var(--mono); }
    .atm-brand-name { color: var(--accent); font-size: 15px; letter-spacing: 2px; }
    .atm-brand-sub { color: var(--muted); font-size: 10px; letter-spacing: 1px; margin-top: 2px; }
    .status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Screen Area ── */
    .atm-screen {
      padding: 28px 24px 24px;
    }

    /* ── Typography ── */
    .screen-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,212,255,.15);
    }

    h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p  { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* ── Balance Display ── */
    .balance-display {
      background: linear-gradient(135deg, #0d2240 0%, #091828 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin: 20px 0;
    }
    .balance-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .balance-amount {
      font-family: var(--mono);
      font-size: 32px;
      color: var(--green);
      letter-spacing: 1px;
    }
    .balance-currency { font-size: 14px; color: var(--muted); margin-left: 6px; }

    /* ── Cards / Menu Items ── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .menu-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 12px;
      color: var(--text);
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .menu-btn:hover {
      background: #1e2d4a;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,212,255,.12);
    }
    .menu-btn .icon { font-size: 26px; }
    .menu-btn .label { font-size: 12px; font-weight: 600; letter-spacing: .5px; }
    .menu-btn.danger { border-color: rgba(255,82,82,.3); }
    .menu-btn.danger:hover { border-color: var(--red); background: rgba(255,82,82,.08); }
    .menu-btn.full { grid-column: span 2; }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 18px;
      padding: 14px 16px;
      outline: none;
      letter-spacing: 3px;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%;
      padding: 14px;
      border: none; border-radius: 12px;
      font-family: var(--sans); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; text-align: center;
      text-decoration: none; letter-spacing: .5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #000;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,.35); }
    .btn-secondary {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); margin-top: 10px;
    }
    .btn-secondary:hover { border-color: var(--accent); background: #1e2d4a; }
    .btn-danger { background: rgba(255,82,82,.15); border: 1px solid rgba(255,82,82,.4); color: var(--red); }
    .btn-danger:hover { background: rgba(255,82,82,.25); }

    /* ── Quick Amount Chips ── */
    .quick-amounts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
      font-family: var(--mono); font-size: 13px; color: var(--text);
      cursor: pointer; transition: all .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.06); }

    /* ── Alerts ── */
    .alert {
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert-error  { background: rgba(255,82,82,.1);  border: 1px solid rgba(255,82,82,.3);  color: var(--red);   }
    .alert-success{ background: rgba(0,230,118,.1);  border: 1px solid rgba(0,230,118,.3);  color: var(--green); }

    /* ── Success Screen ── */
    .success-icon {
      font-size: 56px; text-align: center;
      margin: 16px 0 8px;
      animation: pop .4s ease;
    }
    @keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    .success-msg { text-align: center; font-size: 18px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    .success-sub { text-align: center; color: var(--muted); font-size: 13px; }

    /* ── History List ── */
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item .h-left { display: flex; flex-direction: column; gap: 4px; }
    .history-action { font-size: 13px; font-weight: 600; }
    .history-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .history-amount { font-family: var(--mono); font-size: 15px; font-weight: 700; }
    .amount-minus { color: var(--red); }
    .amount-plus  { color: var(--green); }

    /* ── PIN Dots ── */
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin: 20px 0; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border);
      transition: all .2s;
    }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

    /* ── User Chip ── */
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #000; font-weight: 700; flex-shrink: 0;
    }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-card-num { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    /* ── Demo hint ── */
    .demo-hint {
      background: rgba(255,215,64,.05); border: 1px solid rgba(255,215,64,.2);
      border-radius: 10px; padding: 12px 16px; margin-top: 16px;
      font-size: 12px; color: var(--gold); line-height: 1.7;
    }
    .demo-hint strong { display: block; margin-bottom: 4px; letter-spacing: 1px; }

    /* ── Footer ── */
    .atm-footer {
      background: #0d1120; border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .footer-brand { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    @media(max-width:480px){ .atm-shell{border-radius:16px;} .balance-amount{font-size:26px;} }
  </style>
</head>
<body>
  <div class="atm-shell">
    <div class="atm-header">
      <div class="atm-logo">🏧</div>
      <div class="atm-brand">
        <div class="atm-brand-name">UZBANK ATM</div>
        <div class="atm-brand-sub">SECURE TERMINAL v2.4</div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="atm-screen">
      {% block content %}{% endblock %}
    </div>

    <div class="atm-footer">
      <span class="footer-time" id="clock">--:--:--</span>
      <span class="footer-brand">🔒 256-BIT ENCRYPTED</span>
    </div>
  </div>

  <script>
    function tick(){
      const t = new Date();
      document.getElementById("clock").textContent =
        t.toLocaleTimeString("ru-RU");
    }
    tick(); setInterval(tick, 1000);

    // PIN dots animation
    const pinInput = document.getElementById("pinInput");
    if(pinInput){
      pinInput.addEventListener("input", function(){
        const len = Math.min(this.value.length, 4);
        document.querySelectorAll(".pin-dot").forEach((d,i)=>{
          d.classList.toggle("filled", i < len);
        });
      });
    }

    // Quick amount chips
    document.querySelectorAll(".chip").forEach(chip=>{
      chip.addEventListener("click",()=>{
        const inp = document.getElementById("amountInput");
        if(inp) inp.value = chip.dataset.amount;
      });
    });
  </script>
</body>
</html>
